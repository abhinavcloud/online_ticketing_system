<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details</title>

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>

<body>
  <div class="page-shell">

    <!-- HEADER -->
    <header class="site-header">
      <div class="inner">
        <a class="brand" href="index.html" aria-label="mytickets.click home">
            <img
              src="assets/mytickets_logo.png"
              alt="mytickets.click"
              class="brand-logo"
            />
        </a>
        <nav class="nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="locations.html">Locations</a>
          <a class="nav-link" href="events.html">Events</a>

          <span class="badge hidden" data-auth="true">
            Welcome, <span data-auth-profile class="muted">User</span>
          </span>

          <a class="nav-link" href="login.html" data-guest="true" data-action="login">Login</a>
          <a class="nav-link hidden" href="#" data-auth="true" data-action="logout">Logout</a>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">
      <div class="container">

        <section class="section panel">

          <div id="eventDetailContainer">

            <!-- LOADING STATE -->
            <div class="loader"></div>

            <div class="message-box info mt-3">
              <p class="mb-0">
                Loading event details...
              </p>
            </div>

          </div>

        </section>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="inner">
        <div class="muted">© mytickets.click</div>
        <div class="muted">Discover and book amazing events</div>
      </div>
    </footer>

  </div>

  <!-- SCRIPT -->
  <script type="module" src="assets/js/pages/event-detail.js"></script>

</body>
</html>
