<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing In</title>

  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>

<body>
  <div class="page-shell">

    <!-- HEADER -->
    <header class="site-header">
      <div class="inner">
        <a class="brand" href="index.html">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>MyTickets</span>
        </a>

        <nav class="nav-links">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="locations.html">Locations</a>
          <a class="nav-link" href="events.html">Events</a>

          <span class="badge hidden" data-auth="true">
            Welcome, <span data-auth-profile class="muted">User</span>
          </span>

          <a class="nav-link" href="login.html" data-guest="true" data-action="login">Login</a>
          <a class="nav-link hidden" href="#" data-auth="true" data-action="logout">Logout</a>
        </nav>
      </div>
    </header>

    <!-- MAIN -->
    <main class="main">
      <div class="container">

        <section class="section panel">
          <div class="form-card">

            <!-- LOADER -->
            <div class="loader"></div>

            <!-- TITLE -->
            <h1 class="section-title mt-3">
              Signing you in...
            </h1>

            <!-- MESSAGE -->
            <p id="callbackMessage" class="section-subtitle mb-0">
              Please wait while we securely log you into your account.
            </p>

            <!-- EXTRA REASSURANCE -->
            <div class="message-box info mt-3">
              <p class="mb-0">
                🔐 This may take a few seconds. You’ll be redirected automatically.
              </p>
            </div>

          </div>
        </section>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="inner">
        <div class="muted">© MyTickets</div>
        <div class="muted">Secure and seamless event booking</div>
      </div>
    </footer>

  </div>

  <!-- SCRIPT -->
  <script type="module" src="assets/js/pages/callback.js"></script>

</body>
</html>
