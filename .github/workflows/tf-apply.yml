name: Terraform Plan and Apply

description: This is a reusable workflow designed to initialise terraform and run terraform plan and upload the plan as an artifact

on:
  workflow_dispatch:
    inputs:
        enable_custom_domain:
          description : "Enable custom domain & ACM Certificate on Cloud front. (True only after DNS validation)"
          required: false
          default: "false"
          type: choice
          options:
            - "true"
            - "false"



permissions:
  id-token: write
  contents: read 

defaults:
  run:
    working-directory: ./Infra



jobs:
    terraform-plan-apply:
        runs-on: ubuntu-latest

        env:
          TF_VAR_master_username: ${{secrets.AURORA_USERNAME}}
          TF_VAR_master_password: ${{secrets.AURORA_PASSWORD}}
          TF_VAR_app_db_user: ${{secrets.AURORA_USERNAME}}
          TF_VAR_account_id: ${{secrets.ACCOUNT_ID}}
          TF_VAR_client_id: ${{secrets.CLIENT_ID}}
          TF_VAR_client_secret: ${{secrets.CLIENT_SECRET}}
          TF_VAR_root_domain: ${{secrets.root_domain}}  # example.com
          TF_VAR_domain_url: ${{ secrets.DOMAIN_URL}} # https://example.com
        

        steps:

            - name: Checkout-code
              uses: actions/checkout@v4

            - name: Setup-aws
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{secrets.AWS_ARN}}
                aws-region: ap-south-1
            
            - name: setup-terraform
              uses: hashicorp/setup-terraform@v4
              with:
                terraform_version: ">= 1.14.0"

            - name: terraform-init
              run: | 
                  terraform init \
                    -backend-config="bucket=${{secrets.state_bucket}}" \
                    -backend-config="key=${{secrets.state_bucket_key}}" \
                    -backend-config="region=${{secrets.state_bucket_region}}" \
                    -backend-config="use_lockfile=true" \
                    -backend-config="encrypt=true"

            #- name: terraform-lock-release
            #  run: terraform force-unlock -force ee814eb9-1e56-c848-ddce-efc7cff80ae8

            - name: terraform-plan
              run: terraform plan -out=tfplan

            - name: terraform-plan-show
              run: |
                    terraform show tfplan > tfplan.txt


            - name: upload-tfplan-artifact
              uses: actions/upload-artifact@v4
              with:
                name: teraform-plan-artifact
                path: ./Infra/tfplan.txt
                if-no-files-found: error

            - name: terraform-apply
              id: terraform-apply
              run: terraform apply -auto-approve tfplan

            - name: Export Terraform outputs as step outputs
              id: tf_out
              shell: bash
              run: |
                set -euo pipefail

                # Capture terraform outputs as JSON
                TF_OUT=$(terraform output -json)

             
                COGNITO_DOMAIN=$(echo "$TF_OUT" | jq -r '.cognito_domain.value')
                CLIENT_ID=$(echo "$TF_OUT" | jq -r '.cognito_client_id.value')
                REDIRECT_URI=$(echo "$TF_OUT" | jq -r '.redirect_uris.value')
                LOGOUT_URI= $(echo "$TF_OUT" | jq -r '.logout_uris.value')
                DISTRIBUTION_ID=$(echo "$TF_OUT" | jq -r '.distribution_id.value')
                AWS_REGION=$(echo "$TF_OUT" | jq -r '.aws_region.value')

                {
                  echo "cognito_domain=$COGNITO_DOMAIN"
                  echo "client_id=$CLIENT_ID"
                  echo "redirect_uri=$REDIRECT_URI"
                  echo "logout_uri" = $LOGOUT_URI"
                  echo "distribution_id=$DISTRIBUTION_ID"
                  echo "aws_region"=$AWS_REGION
                } >> "$GITHUB_OUTPUT"



            - name: Generate frontend config.js from Terraform outputs
              run: |
                  cat > ../Code/frontend/assets/js/config.js <<EOF
                  window.APP_CONFIG = {
                    appName: 'Online Ticketing System',
                    apiBaseUrl:  "${{ secrets.DOMAIN_URL }}",
                    region: "${{ steps.tf_out.outputs.aws_region }}",
                    cognitoDomain: "${{ steps.tf_out.outputs.cognito_domain }}",
                    cognitoClientId: "${{ steps.tf_out.outputs.client_id }}",
                    redirectUri: "${{ steps.tf_out.outputs.redirect_uri }}",
                    logoutUri: "${{ steps.tf_out.outputs.logout_uri }}",
                    oauthScopes: ['openid', 'email'],
                    identityProvider: 'Google',
                    browsePageSize: 12,
                    maxSeatSelection: 5,
                    queuePollFallbackSeconds: 5
                  };
                  EOF


                  echo "Generated config.js:"
                  cat ../Code/frontend/assets/js/config.js

            - name: upload website code in S3 bucket
              if: ${{steps.terraform-apply.outcome == 'success'}}
              run: aws s3 sync ../Code/frontend s3://online-ticket-system-demo-bucket --delete

            - name: invalidate cloudfront cache
              if: ${{steps.terraform-apply.outcome == 'success'}}
              run: |
                    aws cloudfront create-invalidation \
                      --distribution-id "${{ steps.tf_out.outputs.distribution_id }}" \
                      --paths "/*"




                